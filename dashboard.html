<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PawGress — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400..800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- small paw video peeking from the corner, just for brand consistency —
       much smaller than the login page cats so it doesn't crowd the task list -->
  <video class="corner-cat" id="corner-video" muted autoplay loop src="images&videos/paw.mp4"></video>

  <div class="topbar">
    <div class="brand">
      <img src="images&videos/pawgress.png" id="brand-logo">
    </div>
    <div class="topbar-right">
      <span id="user-email"></span>
      <button id="logout-btn">Log Out</button>
    </div>
  </div>

  <main class="dashboard-main">

    <div class="greeting">
      <h1>Your Tasks</h1>
      <p>Here's what's on your plate today.</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <div class="dashboard-grid">

      <div class="panel">
        <h2>Add a Task</h2>
        <form id="task-form">
          <div class="field">
            <label for="task-name">Task name</label>
            <input type="text" id="task-name" required placeholder="e.g. Write blog post">
          </div>
          <div class="field">
            <label for="task-date">Due date</label>
            <input type="date" id="task-date" required>
          </div>
          <div class="field">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Add Task</button>
        </form>
      </div>

      <div class="panel">
        <div class="list-controls">
          <div class="pill-toggle" id="filter-toggle">
            <button class="active" data-filter="all">All</button>
            <button data-filter="pending">Pending</button>
            <button data-filter="completed">Completed</button>
          </div>
          <select class="sort-select" id="sort-select">
            <option value="date">Sort by Date</option>
            <option value="priority">Sort by Priority</option>
          </select>
        </div>

        <div class="task-list" id="task-list"></div>

        <div class="empty-state" id="empty-state" style="display:none;">
          No tasks yet — add your first one on the left.
        </div>
      </div>

    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
