<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400..800&display=swap" rel="stylesheet">
</head>
<body>
  <video class="cat-video" id="paw-video" muted autoplay loop src="images-videos/paw.mp4"></video>

  <video class="cat-video" id="lying-video" muted autoplay loop src="images-videos/lying.webm"></video>

  <video class="cat-video" id="sneak-video" src="images-videos/sneak.mp4" muted autoplay loop
      ></video>

  <main>
    <div id="full-heading">
      <p id="welcome">JOIN</p>
      <img src="images-videos/pawgress.png" id="pawgress">
      <p id="tagline">this cat is lazy, but we've got work to do</p>
    </div>

    <div id="credentials">

      <div id="enter-credentials">
        <div class="text-fields">Email<br><input type="email" id="email" required placeholder="richa23garg@gmail.com"></div>

        <div class="text-fields">Password <br><input type="password" id="password" required minlength="6" placeholder="Atleast 6 characters"></div>

        <p id="auth-error"></p>
     </div>

      <div id="submit-credentials">
        <button id="register-btn">Register</button>
        <pre>Already have an account?
<a href="index.html">Login</a></pre>
      </div>

    </div>
  </main>

  <script type="module" src="auth.js"></script>

</body>
</html>
