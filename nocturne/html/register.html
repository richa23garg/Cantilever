<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geomini:wght@200..800&display=swap" rel="stylesheet">
</head>
<body>
  <video src="../images-videos/nyc.mp4" autoplay muted loop></video>
  <div id="container">
    <div id="full-heading">
      <img src="../images-videos/nocturne.png">
      <p id="tagline">REGISTER</p>
    </div>
    <div id="credentials">
      <div id="enter-cred">
        <label for="email">Email</label><br>
        <input type="text" id="email" placeholder="richa@gmail.com" required="true"><br><br>
        <label for="password">Password</label><br>
        <input type="password" id="password" placeholder="Atleast 6 characters" required="true">
        <p id="auth-error" class="form-error"></p>
      </div>
      <div id="submit-cred">
        <button id="register-btn">Register</button><br><br>
        <p class="below-button">Already have an account?<br><a href="login.html">Login</a></p><br>
        <a class="below-button" href="index.html">Back to posts</a>

      </div>
    </div>

  </div>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
